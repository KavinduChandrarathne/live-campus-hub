<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Hub - Sign Up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="./">

    <!-- CSS -->
    <link rel="stylesheet" href="./styles/signup.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./styles/emergency-alert-banner.css">
</head>
<body>

<div class="background-overlay"></div>

<div class="signup-container">

    <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>Campus Hub</h2>
    </div>

    <h3>Create an Account</h3>
    <p>Sign up to get started</p>

    <form id="signupForm">

        <div class="form-grid">

            <div class="input-group">
                <label>First Name</label>
                <input type="text" name="firstName" placeholder="First Name" required>
            </div>

            <div class="input-group">
                <label>Last Name</label>
                <input type="text" name="lastName" placeholder="Last Name" required>
            </div>

            <div class="input-group">
                                <label>Faculty</label>
                                <select name="faculty" required>
                                    <option value="">Select Faculty</option>
                                    <option value="Business">Business</option>
                                    <option value="Arts">Arts</option>
                                    <option value="Science">Science</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Medicine">Medicine</option>
                                    <option value="Law">Law</option>
                                    <option value="IT">IT</option>
                                </select>
            </div>

            <div class="input-group">
                <label>ID Number</label>
                <input type="text" name="studentId" placeholder="ID Number" required>
            </div>

            <div class="input-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
            </div>

        </div>

        <button type="submit">Sign Up</button>

    </form>

    <div class="login-link">
        Already have an account? <a href="././index.html">Sign in</a>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <style>
        .toast {
            visibility: hidden;
            min-width: 220px;
            max-width: 90vw;
            background-color: #223a5f;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px 28px;
            position: fixed;
            z-index: 2000;
            left: 50%;
            top: 40px;
            transform: translateX(-50%);
            font-size: 17px;
            font-weight: 500;
            box-shadow: 0 4px 16px rgba(0,0,0,0.13);
            opacity: 0;
            transition: opacity 0.3s, visibility 0.3s;
        }
        .toast.show {
            visibility: visible;
            opacity: 1;
        }
        .toast.toast-error {
            background: #ff4757;
        }
        .toast.toast-success {
            background: #2ecc71;
        }
    </style>

</div>

<script src="javascript/signup.js"></script>
<script src="javascript/emergency-alert-banner.js"></script>
</body>
</html>
