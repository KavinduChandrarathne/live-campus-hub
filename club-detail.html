<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Hub | Club Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="./">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./styles/dashboard.css">
    <style>
        main.content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .club-header {
            background: linear-gradient(135deg, #1f3556 0%, #2d4a6f 100%);
            color: white;
            padding: 24px 28px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            flex-shrink: 0;
        }

        .club-header-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .club-header-info h2 {
            margin: 0 0 4px 0;
            font-size: 28px;
            font-weight: 700;
        }

        .club-header-info p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .back-btn {
            position: absolute;
            left: 40px;
            top: 40px;
            background: transparent;
            border: none;
            color: #1f3556;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(31, 53, 86, 0.1);
        }

        .club-updates {
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }

        .club-updates::-webkit-scrollbar {
            width: 8px;
        }

        .club-updates::-webkit-scrollbar-track {
            background: transparent;
        }

        .club-updates::-webkit-scrollbar-thumb {
            background: #23395d;
            border-radius: 4px;
        }

        .club-updates::-webkit-scrollbar-thumb:hover {
            background: #1a2846;
        }

        .update-item {
            background: white;
            padding: 18px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            display: flex;
            gap: 14px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .update-item:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .update-icon {
            width: 40px;
            height: 40px;
            background: #f0f3f7;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #23395d;
            font-size: 18px;
            flex-shrink: 0;
        }

        .update-content h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
            font-weight: 600;
            color: #11223b;
        }

        .update-content p {
            margin: 0 0 8px 0;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }

        .update-time {
            font-size: 11px;
            color: #999;
        }

        @media (max-width: 900px) {
            main.content {
                padding: 30px 20px;
            }
            .club-header {
                padding: 20px;
                margin-bottom: 20px;
            }
            .club-header-info h2 {
                font-size: 24px;
            }
        }

        @media (max-width: 600px) {
            main.content {
                padding: 24px 16px;
            }
            .club-header {
                padding: 16px;
                gap: 14px;
            }
            .club-header-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
            .club-header-info h2 {
                font-size: 20px;
            }
            .update-item {
                padding: 14px;
                gap: 12px;
            }
            .update-content h3 {
                font-size: 14px;
            }
            .update-content p {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>CAMPUS HUB</span>
        </div>

        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="facility.html"><i class="fa-solid fa-bullhorn"></i> Facility & Event</a>
            <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
            <a class="active" href="clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
            <a href="updates.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
            <a href="rewards.html"><i class="fa-solid fa-star"></i> Rewards</a>
        </nav>

        <div class="sidebar-user-bottom">
            <a class="user-profile-btn" href="profile.html" title="View Profile">
                <img id="sidebar-picture" src="" alt="User">
                <div class="user-info-text">
                    <strong id="sidebar-name"></strong>
                    <small id="sidebar-email"></small>
                </div>
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="content">
        <button class="back-btn" onclick="history.back()">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div class="club-header">
            <div class="club-header-icon" id="clubIcon"></div>
            <div class="club-header-info">
                <h2 id="clubName">Club Name</h2>
                <p id="clubDesc">Club description</p>
            </div>
        </div>

        <div class="club-updates" id="clubUpdates">
            <!-- Updates will be populated here -->
        </div>
    </main>

</div>

<script src="./javascript/common.js"></script>
<script src="./javascript/dashboard.js"></script>
<script>

                },
                {
                    icon: '<i class="fa-solid fa-book"></i>',
                    title: 'Resource: Web Development Guide',
                    desc: 'Check out our new guide on modern web development frameworks.',

                }
            ]
        },
        'rotaract': {
            name: 'Rotaract Club',
            icon: '<i class="fa-solid fa-bus"></i>',
            desc: 'Community service & networking for professionals',
            updates: [
                {
                    icon: '<i class="fa-solid fa-heart"></i>',
                    title: 'Charity Drive This Saturday',
                    desc: 'Join us for a community cleanup at Central Park. Starting at 9 AM.',
                    time: 'Today 1:45 PM'
                },
                {
                    icon: '<i class="fa-solid fa-users"></i>',
                    title: 'Guest Speaker: Local Entrepreneur',
                    desc: 'Meet with successful entrepreneur discussing sustainable business practices.',
                    time: 'Yesterday 3:20 PM'
                },
                {
                    icon: '<i class="fa-solid fa-calendar"></i>',
                    title: 'Monthly Social Hour',
                    desc: 'Network with fellow members at our monthly gathering next Friday.',
                    time: 'February 23, 2026'
                }
            ]
        },
        'sports': {
            name: 'Sports Society',
            icon: '<i class="fa-solid fa-baseball"></i>',
            desc: 'Athletics, tournaments & fitness programs',
            updates: [
                {
                    icon: '<i class="fa-solid fa-trophy"></i>',
                    title: 'Intramural Football Tournament',
                    desc: 'Registration for spring tournament now open. Sign up your team today!',
                    time: 'Today 10:30 AM'
                },
                {
                    icon: '<i class="fa-solid fa-dumbbell"></i>',
                    title: 'Fitness Training Sessions',
                    desc: 'New cardio and strength training classes start next Monday.',
                    time: 'Yesterday 5:00 PM'
                },
                {
                    icon: '<i class="fa-solid fa-person-running"></i>',
                    title: 'Campus Marathon Coming',
                    desc: 'Early bird registration for the campus marathon ends March 5th.',
                    time: 'February 22, 2026'

            ]
        },
        'leo': {
            name: 'Leo Club',
            icon: '<i class="fa-solid fa-user-secret"></i>',
            desc: 'Leadership development & service initiatives',
            updates: [
                {
                    icon: '<i class="fa-solid fa-brain"></i>',
                    title: 'Leadership Workshop Next Week',
                    desc: 'Learn essential leadership skills from industry experts. Limited seats available!',
                    time: 'Today 2:00 PM'
                },
                {
                    icon: '<i class="fa-solid fa-handshake"></i>',
                    title: 'Mentorship Program Launch',
                    desc: 'Become a mentor or find a mentor in our new matching program.',
                    time: 'Yesterday 11:15 AM'
                },
                {
                    icon: '<i class="fa-solid fa-target"></i>',
                    title: 'Service Project Planning',
                    desc: 'Share your ideas for our next community service initiative.',
                    time: 'February 21, 2026'
                }
            ]
        },
        'media': {
            name: 'Media Society',
            icon: '<i class="fa-solid fa-music"></i>',
            desc: 'Content creation, media production & events',
            updates: [
                {

                    desc: 'Learn cinematography basics using professional equipment. Spaces limited to 20.',
                    time: 'Today 3:30 PM'
                },
                {
                    icon: '<i class="fa-solid fa-podcast"></i>',
                    title: 'New Podcast Series Launch',
                    desc: 'Tune in to our new weekly podcast featuring campus interviews and stories.',

                },
                {
                    icon: '<i class="fa-solid fa-film"></i>',
                    title: 'Film Screening Event',
                    desc: 'Join us for a screening of award-winning documentaries this Friday.',

            ]
        },
        'photography': {
            name: 'Photography Club',
            icon: '<i class="fa-solid fa-camera"></i>',
            desc: 'Photography skills, exhibitions & portfolio building',
            updates: [
                {
                    icon: '<i class="fa-solid fa-camera"></i>',
                    title: 'Photo Walk: Urban Photography',
                    desc: 'Explore the city and capture urban landscapes. Saturday 10 AM, meet at Main Gate.',
                    time: 'Today 12:00 PM'
                },
                {
                    icon: '<i class="fa-solid fa-palette"></i>',
                    title: 'Photo Editing Masterclass',
                    desc: 'Advanced editing techniques using Lightroom and Photoshop with pro photographer.',
                    time: 'Yesterday 6:00 PM'
                },
                {
                    icon: '<i class="fa-solid fa-image"></i>',
                    title: 'Spring Exhibition Submissions Open',
                    desc: 'Submit your best work for the annual spring photography exhibition.',
                    time: 'February 19, 2026'
                }
            ]
        }
    };

    // Get club from URL parameter
    function getClubFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('club') || 'coding';
    }

    // Load club data
    function loadClubData() {
        const club = getClubFromUrl();
        const data = clubData[club] || clubData['coding'];

        // Set header info
        document.getElementById('clubIcon').innerHTML = data.icon;
        document.getElementById('clubName').textContent = data.name;
        document.getElementById('clubDesc').textContent = data.desc;

        // Generate updates
        const updatesContainer = document.getElementById('clubUpdates');
        updatesContainer.innerHTML = '';

        data.updates.forEach(update => {
            const updateItem = document.createElement('div');
            updateItem.className = 'update-item';
            updateItem.innerHTML = `
                <div class="update-icon">${update.icon}</div>
                <div class="update-content">
                    <h3>${update.title}</h3>
                    <p>${update.desc}</p>
                    <span class="update-time">${update.time}</span>
                </div>
            `;
            updatesContainer.appendChild(updateItem);
        });
    }

    // Load data on page load
    document.addEventListener('DOMContentLoaded', loadClubData);
</script>

</body>
<script>
// User dropdown logic for logout/profile
</script>
</html>
