<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Hub | Club Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="./">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./styles/dashboard.css">
    <style>
        main.content {
            padding: 40px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .club-header {
            background: linear-gradient(135deg, #1f3556 0%, #2d4a6f 100%);
            color: white;
            padding: 24px 28px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            flex-shrink: 0;
        }

        .club-header-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .club-header-info h2 {
            margin: 0 0 4px 0;
            font-size: 28px;
            font-weight: 700;
        }

        .club-header-info p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .back-btn {
            position: absolute;
            left: 40px;
            top: 40px;
            background: transparent;
            border: none;
            color: #1f3556;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(31, 53, 86, 0.1);
        }

        .club-updates {
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
        }
        .not-member-msg {
            font-size: 16px;
            padding: 20px;
            background: #fff5f5;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            color: #a94442;
            text-align: center;
            margin-top: 40px;
        }
        .member-notice {
            margin-top: 8px;
            font-size: 14px;
            color: #48a868;
            font-weight: 600;
        }

        .leave-club-btn {
            margin-top: 12px;
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
            display: inline-block;
        }

        .leave-club-btn:hover {
            background: #ff3838;
        }

        .leave-club-btn:active {
            transform: scale(0.98);
        }

        .club-updates::-webkit-scrollbar {
            width: 8px;
        }

        .club-updates::-webkit-scrollbar-track {
            background: transparent;
        }

        .club-updates::-webkit-scrollbar-thumb {
            background: #23395d;
            border-radius: 4px;
        }

        .club-updates::-webkit-scrollbar-thumb:hover {
            background: #1a2846;
        }

        .update-item {
            background: white;
            padding: 18px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            display: flex;
            gap: 14px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .update-item:hover {
            transform: translateX(4px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .update-icon {
            width: 40px;
            height: 40px;
            background: #f0f3f7;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #23395d;
            font-size: 18px;
            flex-shrink: 0;
        }

        .update-content h3 {
            margin: 0 0 4px 0;
            font-size: 16px;
            font-weight: 600;
            color: #11223b;
        }

        .update-content p {
            margin: 0 0 8px 0;
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }

        .update-time {
            font-size: 11px;
            color: #999;
        }

        @media (max-width: 900px) {
            main.content {
                padding: 30px 20px;
            }
            .club-header {
                padding: 20px;
                margin-bottom: 20px;
            }
            .club-header-info h2 {
                font-size: 24px;
            }
        }

        @media (max-width: 600px) {
            main.content {
                padding: 24px 16px;
            }
            .club-header {
                padding: 16px;
                gap: 14px;
            }
            .club-header-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }
            .club-header-info h2 {
                font-size: 20px;
            }
            .update-item {
                padding: 14px;
                gap: 12px;
            }
            .update-content h3 {
                font-size: 14px;
            }
            .update-content p {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>CAMPUS HUB</span>
        </div>

        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="facility.html"><i class="fa-solid fa-bullhorn"></i> Facility & Event</a>
            <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
            <a class="active" href="clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
            <a href="updates.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
            <a href="rewards.html"><i class="fa-solid fa-star"></i> Rewards</a>
        </nav>

        <div class="sidebar-user-bottom">
            <a class="user-profile-btn" href="profile.html" title="View Profile">
                <img id="sidebar-picture" src="" alt="User">
                <div class="user-info-text">
                    <strong id="sidebar-name"></strong>
                    <small id="sidebar-email"></small>
                </div>
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="content">
        <button class="back-btn" onclick="history.back()">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div class="club-header">
            <div class="club-header-icon" id="clubIcon"></div>
            <div class="club-header-info">
                <h2 id="clubName">Club Name</h2>
                <p id="clubDesc">Club description</p>
            </div>
        </div>

        <div class="club-updates" id="clubUpdates">
            <!-- Updates will be populated here -->
        </div>
    </main>

</div>

<script src="./javascript/common.js"></script>
<script src="./javascript/dashboard.js"></script>
<script>
    // no hard‑coded club data any more; we will fetch from clubs API and updates API
    // Get club from URL parameter
    function getClubFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get('club') || 'coding';
    }

    // Utility to check whether current user is an accepted member
    function checkMembership(clubKey, user) {
        if (!user || !user.joinedClubs) return Promise.resolve(false);
        return Promise.resolve(user.joinedClubs.some(c => c.toLowerCase() === clubKey.toLowerCase()));
    }

    // helper to format datetime string consistently
    function formatDateTime(dt) {
        if (!dt) return '';
        const d = new Date(dt.replace(/-/g, '/'));
        const now = new Date();
        let h = d.getHours();
        let m = String(d.getMinutes()).padStart(2, "0");
        const ampm = h >= 12 ? "PM" : "AM";
        h = h % 12 || 12;
        if (d.toDateString() === now.toDateString()) {
            return `Today ${h}.${m} ${ampm}`;
        }
        return `${d.toLocaleDateString()} ${h}.${m} ${ampm}`;
    }

    // Handle leaving a club
    function handleLeaveClub(clubName, user) {
        if (!confirm(`Are you sure you want to leave "${clubName}"?`)) {
            return;
        }

        const formData = new FormData();
        formData.append('studentId', user.studentId || '');
        formData.append('clubName', clubName);
        formData.append('status', 'removed');

        fetch('Admin/shared/php/update-join-request.php', {
            method: 'POST',
            body: formData
        })
        .then(r => r.json())
        .then(result => {
            if (result.success) {
                // Refresh user data and navigate back
                refreshCurrentUser().then(() => {
                    alert('You have left the club successfully.');
                    window.location.href = 'clubs.html';
                });
            } else {
                alert('Error: ' + (result.error || 'Failed to leave club'));
            }
        })
        .catch(err => {
            console.error('Leave club error:', err);
            alert('Failed to leave club');
        });
    }

    // Load club data and decide what to display
    function loadClubData() {
        const clubKey = getClubFromUrl();
        const user = getCurrentUser();
        const updatesContainer = document.getElementById('clubUpdates');

        // fetch list of clubs to get full info
        fetch('Admin/shared/php/api-get-clubs.php')
            .then(res => res.json())
            .then(clubs => {
                // find club by first-word match
                const clubObj = clubs.find(c => {
                    const nameNorm = (c.name || '').trim().toLowerCase();
                    const first = nameNorm.split(' ')[0];
                    return nameNorm === clubKey || first === clubKey;
                }) || { name: '', icon: '', desc: '' };

                // set header info
                document.getElementById('clubIcon').innerHTML = clubObj.icon ? `<i class="fa-solid ${clubObj.icon}"></i>` : '';
                document.getElementById('clubName').textContent = clubObj.name || '';
                document.getElementById('clubDesc').textContent = clubObj.desc || '';

                // now membership check
                checkMembership(clubKey, user).then(isMember => {
                    if (!isMember) {
                        updatesContainer.innerHTML = '<div class="not-member-msg">You must join this club before viewing updates.</div>';
                        return;
                    }

                    // show a small notice that they're a member
                    const headerInfo = document.querySelector('.club-header-info');
                    const notice = document.createElement('div');
                    notice.className = 'member-notice';
                    notice.textContent = '🎉 You are a member of this club';
                    
                    // Create leave button
                    const leaveBtn = document.createElement('button');
                    leaveBtn.className = 'leave-club-btn';
                    leaveBtn.textContent = 'Leave Club';
                    leaveBtn.onclick = () => handleLeaveClub(clubObj.name, user);
                    
                    headerInfo.appendChild(notice);
                    headerInfo.appendChild(leaveBtn);

                    // fetch updates
                    const url = `Admin/shared/php/get-club-updates.php?club=${encodeURIComponent(clubObj.name)}`;
                    console.log('requesting club updates URL', url);
                    fetch(url)
                        .then(r => {
                            console.log('club updates response status', r.status);
                            return r.json();
                        })
                        .then(updates => {
                            console.log('club updates data', updates);
                            updatesContainer.innerHTML = '';
                            if (Array.isArray(updates) && updates.length) {
                                updates.forEach(update => {
                                    const updateItem = document.createElement('div');
                                    updateItem.className = 'update-item';
                                    updateItem.setAttribute('data-datetime', update.datetime);
                                    updateItem.setAttribute('data-message', update.message);
                                    updateItem.innerHTML = `
                                        <div class="update-icon"><i class="fa-solid ${update.icon}"></i></div>
                                        <div class="update-content">
                                            <h3>${update.message}</h3>
                                            <p>${update.description || ''}</p>
                                            <span class="update-time">${formatDateTime(update.datetime)}</span>
                                        </div>
                                    `;
                                    updatesContainer.appendChild(updateItem);
                                });

                                // Check if there's a notification to highlight
                                const highlight = sessionStorage.getItem('highlightUpdate');
                                if (highlight) {
                                    try {
                                        const highlightData = JSON.parse(highlight);
                                        const matchingUpdate = updatesContainer.querySelector(
                                            `[data-datetime="${highlightData.datetime}"]`
                                        );
                                        if (matchingUpdate) {
                                            matchingUpdate.style.backgroundColor = '#fff3cd';
                                            matchingUpdate.style.borderLeft = '4px solid #ffc107';
                                            setTimeout(() => {
                                                matchingUpdate.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                            }, 100);
                                        }
                                        sessionStorage.removeItem('highlightUpdate');
                                    } catch (e) {
                                        console.error('Error highlighting update:', e);
                                    }
                                }
                            } else {
                                updatesContainer.innerHTML = '<div class="not-member-msg">No updates yet.</div>';
                            }
                        })
                        .catch(err => {
                            console.error('error fetching club updates', err);
                            updatesContainer.innerHTML = '<div class="not-member-msg">Failed to load updates.</div>';
                        });
                });
            })
            .catch(err => {
                console.error('Failed to load club info', err);
            });
    }

    // Load data on page load
    document.addEventListener('DOMContentLoaded', loadClubData);
</script>

</body>
<script>
// User dropdown logic for logout/profile
</script>
</html>
