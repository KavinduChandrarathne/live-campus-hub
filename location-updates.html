<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Campus Hub - Location Updates</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="./">
  <link rel="stylesheet" href="./styles/dashboard.css" />
  <link rel="stylesheet" href="./styles/transit.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./styles/emergency-alert-banner.css" />
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>CAMPUS HUB</span>
        </div>

        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="facility.html"><i class="fa-solid fa-bullhorn"></i> Facility & Event</a>
            <a class="active" href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
            <a href="clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
            <a href="updates.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
            <a href="rewards.html"><i class="fa-solid fa-star"></i> Rewards</a>
        </nav>

        <div class="sidebar-user-bottom">
            <a class="user-profile-btn" href="profile.html" title="View Profile">
                <img id="sidebar-picture" src="" alt="User">
                <div class="user-info-text">
                    <strong id="sidebar-name"></strong>
                    <small id="sidebar-email"></small>
                </div>
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="content">
        <button id="hamburger" class="hamburger" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <header class="page-title">
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
              <h2 id="updates-title">Shuttle Location</h2>
              <span id="status-badge" class="badge on-time">On time</span>
            </div>
            <button id="postLiveBtn" class="btn-route" style="margin-top:10px;">Post Live Location</button>
        </header>

        <section class="updates-panel">
            <div class="live-list"></div>
        </section>
    </main>

</div>

<script>
  function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  let loc = getQueryParam('loc') || 'Gampaha';
  document.getElementById('updates-title').textContent = `${loc} Shuttle`;

  const liveListEl = document.querySelector('.live-list');

  function renderLive(updates) {
    liveListEl.innerHTML = '';
    if (updates.length === 0) {
      liveListEl.innerHTML = '<div class="update"><div>No updates available.</div></div>';
      return;
    }

    updates.forEach(u => {
      const div = document.createElement('div');
      div.className = 'update';
      const iconClass = u.icon || 'fa-location-dot';
      div.innerHTML = `
        <i class="fa-solid ${iconClass}"></i>
        <div>
          <strong>${u.message}</strong>
          <p>${u.description || ''}</p>
          ${u.liveLink ? `<p><a href="${u.liveLink}" target="_blank">Live location</a></p>` : ''}
          <small class="muted">${u.datetime}</small>
        </div>
      `;
      liveListEl.appendChild(div);
    });
  }

  function refreshLive() {
    fetch('Admin/shared/json/transit-updates.json?t='+Date.now())
      .then(r => r.json())
      .then(all => {
        const filtered = all.filter(u => {
          const r = (u.route || '').trim().toLowerCase();
          const desired = loc.trim().toLowerCase();
          // only live‑location posts (have a non-empty link) belong on this page
          return r === desired && u.liveLink;
        });
        renderLive(filtered);
      })
      .catch(err => console.error('Failed to load live locations', err));
  }
  refreshLive();

  try {
    const uname = encodeURIComponent((getCurrentUser() || {}).username || '');
    const es = new EventSource(`Admin/shared/php/user-updates-sse.php?username=${uname}`);
    es.addEventListener('transitupdate', () => {
      refreshLive();
    });
    window.addEventListener('beforeunload', () => es.close());
  } catch (e) {
    console.warn('Transit SSE not available', e);
  }

  const postBtn = document.getElementById('postLiveBtn');
  if (postBtn) {
    postBtn.addEventListener('click', () => {
      alert('Only admins can post live locations.');
    });
  }
</script>
<script src="javascript/common.js"></script>
<script src="javascript/emergency-alert-banner.js"></script>
</body>
</html>
