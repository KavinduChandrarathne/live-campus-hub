<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Hub | Facility & Event</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="./">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="./styles/dashboard.css">
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>CAMPUS HUB</span>
        </div>

        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a class="active" href="facility.html"><i class="fa-solid fa-bullhorn"></i> Facility & Event</a>
            <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
            <a href="clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
            <a href="updates.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
            <a href="rewards.html"><i class="fa-solid fa-star"></i> Rewards</a>
        </nav>

        <div class="sidebar-user-bottom">
            <a class="user-profile-btn" href="profile.html" title="View Profile">
                <img id="sidebar-picture" src="./images/naveen.png" alt="User">
                <div class="user-info-text">
                    <strong id="sidebar-name">User Name</strong>
                    <small id="sidebar-email">user@email.com</small>
                </div>
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="content">
        <!-- Mobile hamburger menu -->
        <button id="hamburger" class="hamburger" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <section class="welcome">
            <h2>Facility & Event Updates</h2>
            <p>Latest facility notices and event announcements</p>
        </section>


        <section class="cards facility-cards">
            <!-- Notifications will be loaded here by JavaScript -->
        </section>

    </main>

</div>

    <!-- Scroll to top (mobile) -->
    <button id="scrollTop" class="scroll-top" aria-label="Scroll to top">
        <i class="fa-solid fa-arrow-up"></i>
    </button>


    <script src="javascript/common.js"></script>
    <script src="javascript/dashboard.js"></script>
    <script src="javascript/facility-event-updates.js"></script>

</body>

</html>
