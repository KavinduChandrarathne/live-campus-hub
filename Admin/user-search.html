<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Hub - User Search</title>

  <link rel="stylesheet" href="styles/user-search.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    #userResultCard {
      display: none;
    }
  </style>
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>CAMPUS HUB</h2>
      </div>

      <nav class="menu">
        <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
        <a href="facility-event-admin.html"><i class="fa-solid fa-bullhorn"></i> Facility &amp; Event</a>
        <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
        <a href="campus-clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
        <a href="updates-feed.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
        <a href="add-notification.html"><i class="fa-solid fa-bell"></i> Notification</a>
        <a class="active" href="user-search.html"><i class="fa-solid fa-magnifying-glass"></i> User Search</a>
      </nav>

      <div class="user" onclick="window.location='admin-profile.html'">
        <img src="images/admin.png" alt="user">
        <div>
          <p>Alice Johnson</p>
          <small>admin1@example.com</small>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="page-title">
        <h1>User Search</h1>
      </header>

      <!-- Search Bar -->
      <section class="search-bar-wrap">
        <div class="search-input-wrap">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="studentSearchInput" placeholder="Enter Student ID (e.g., 1001, S1001, A1001)">
        </div>
        <button id="studentSearchBtn" type="button">Search</button>
      </section>

      <!-- Search Results List -->
      <section class="search-results-list" id="searchResultsList" style="display:none;">
        <div id="resultsContainer" class="results-container">
          <!-- Results will be populated here -->
        </div>
      </section>
    </main>
  </div>

  <script src="javascript/user-search.js"></script>
</body>
</html>
