<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Hub - Add Club</title>

  <link rel="stylesheet" href="styles/add-club.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>CAMPUS HUB</h2>
      </div>

      <div class="user" onclick="window.location='admin-profile.html'">
        <img src="images/admin.png" alt="user">
        <div>
          <p>Admin Name</p>
          <small>admin@example.com</small>
        </div>
      </div>

      <nav class="menu">
        <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
        <a href="facility-event-admin.html"><i class="fa-solid fa-bullhorn"></i> Facility &amp; Event</a>
        <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
        <a class="active" href="campus-clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
        <a href="updates-feed.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
        <a href="add-notification.html"><i class="fa-solid fa-bell"></i> Notification</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Title bar -->
      <header class="page-title">
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        Add Club
      </header>

      <!-- Form panel -->
      <section class="panel">
        <h3 class="panel-title">Add New Club</h3>

        <form id="clubForm" class="form">

          <div class="row">
            <label>Club Name: <span class="req">*</span></label>
            <input id="clubName" type="text" placeholder="Enter club name" required />
          </div>

          <div class="row">
            <label>Description:</label>
            <input id="clubDesc" type="text" placeholder="Enter a brief description of the club's activities and goals" />
          </div>

          <div class="row">
            <label>Select logo: <span class="hint">Choose an icon for the club</span></label>
          </div>

          <!-- Logo picker -->
          <div class="logo-grid" id="logoGrid">

            <button type="button" class="logo-card selected" data-icon="fa-user-group" data-name="Coding Club">
              <div class="logo-icon"><i class="fa-solid fa-user-group"></i></div>
              <div class="logo-name">Coding Club</div>
            </button>

            <button type="button" class="logo-card" data-icon="fa-bus" data-name="Rotaract Club">
              <div class="logo-icon"><i class="fa-solid fa-bus"></i></div>
              <div class="logo-name">Rotaract Club</div>
            </button>

            <button type="button" class="logo-card" data-icon="fa-basketball" data-name="Sports Society">
              <div class="logo-icon"><i class="fa-solid fa-basketball"></i></div>
              <div class="logo-name">Sports Society</div>
            </button>

            <button type="button" class="logo-card" data-icon="fa-music" data-name="Media Society">
              <div class="logo-icon"><i class="fa-solid fa-music"></i></div>
              <div class="logo-name">Media Society</div>
            </button>

            <button type="button" class="logo-card" data-icon="fa-camera" data-name="Photography Club">
              <div class="logo-icon"><i class="fa-solid fa-camera"></i></div>
              <div class="logo-name">Photography Club</div>
            </button>

            <button type="button" class="logo-card" data-icon="fa-dragon" data-name="Leo Club">
              <div class="logo-icon"><i class="fa-solid fa-dragon"></i></div>
              <div class="logo-name">Leo Club</div>
            </button>

          </div>

          <!-- Notification checkbox -->
          <div class="check-row">
            <label class="check">
              <input id="sendNoti" type="checkbox">
              Send as notification
            </label>
          </div>

          <!-- Buttons -->
          <div class="actions">
            <button type="submit" class="btn create">Create club</button>
            <button type="button" class="btn cancel" id="cancelBtn">Cancel</button>
          </div>

        </form>
      </section>

    </main>
  </div>

  <script src="javascript/auth.js"></script>
  <script src="javascript/add-club.js"></script>
  <div class="mobile-backdrop" id="mobileBackdrop"></div>
</body>
</html>
