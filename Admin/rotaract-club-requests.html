<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotaract Club Join Requests</title>
  <link rel="stylesheet" href="styles/club-requests.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="bg-overlay"></div>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>CAMPUS HUB</h2>
      </div>
      <div class="user" onclick="window.location='admin-profile.html'">
        <img src="images/admin.png" alt="user">
        <div>
          <p>Admin Name</p>
          <small>admin@example.com</small>
        </div>
      </div>
      <nav class="menu">
        <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
        <a href="facility-event-admin.html"><i class="fa-solid fa-bullhorn"></i> Facility &amp; Event</a>
        <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
        <a href="campus-clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
        <a href="updates-feed.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
        <a href="add-notification.html"><i class="fa-solid fa-bell"></i> Notification</a>
      </nav>
    </aside>
    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button class="back-btn" onclick="history.back()" title="Back">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        <h1>Rotaract Club Join Requests</h1>
      </header>
      <section class="requests-shell">
        <div class="requests-title-bar">
          <h1>Join Requests</h1>
        </div>
        <div class="requests-tabs">
          <button class="request-tab active" data-filter="all">All</button>
          <button class="request-tab" data-filter="pending">Pending <span id="pendingCount" class="tab-count">0</span></button>
          <button class="request-tab" data-filter="accepted">Accepted <span id="acceptedCount" class="tab-count">0</span></button>
          <button class="request-tab" data-filter="rejected">Rejected <span id="rejectedCount" class="tab-count">0</span></button>
        </div>
        <div class="requests-content">
          <div class="requests-header">
            <div></div>
            <div>Name</div>
            <div>ID</div>
            <div>Club</div>
            <div>Actions</div>
          </div>
          <div id="requestList"></div>
        </div>
      </section>
    </main>
  </div>
  <script src="javascript/club-requests.js"></script>
  <script>
    renderClubRequests('Rotaract Club');
  </script>
  <div class="mobile-backdrop" id="mobileBackdrop"></div>
</body>
</html>
