<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emergency Alerts - Campus Hub Admin</title>

  <link rel="stylesheet" href="styles/emergency-alerts.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="layout">

    <!-- Mobile Hamburger -->
    <button class="hamburger" id="hamburger">
      <i class="fa-solid fa-bars"></i>
    </button>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>CAMPUS HUB</h2>
      </div>

      <div class="user" onclick="window.location='admin-profile.html'">
        <img src="images/admin.png" alt="user">
        <div>
          <p>Admin Name</p>
          <small>admin@example.com</small>
        </div>
      </div>

      <nav class="menu">
        <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
        <a href="facility-event-admin.html"><i class="fa-solid fa-bullhorn"></i> Facility &amp; Event</a>
        <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
        <a href="campus-clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
        <a href="updates-feed.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
        <a href="add-notification.html"><i class="fa-solid fa-bell"></i> Notification</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Top bar -->
      <header class="topbar">
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        <h1>Emergency Alerts</h1>
        <div class="top-actions"></div>
      </header>

      <!-- Container -->
      <div class="emergency-container">
        
        <!-- Left: Alert Details Form -->
        <div class="form-section">
          <h2>Alert Details</h2>
          <form id="alertForm" class="alert-form">
            
            <div class="form-group">
              <label>Title</label>
              <input id="alertTitle" type="text" placeholder="Enter alert title" required>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Type</label>
                <div class="custom-dropdown">
                  <input type="hidden" id="alertType" value="fire">
                  <button type="button" class="dropdown-toggle" id="dropdownToggle">
                    <i class="fa-solid fa-fire"></i>
                    <span>Fire</span>
                    <i class="fa-solid fa-chevron-down"></i>
                  </button>
                  <div class="dropdown-menu" id="dropdownMenu">
                    <button type="button" class="dropdown-item active" data-value="fire">
                      <i class="fa-solid fa-fire"></i>
                      <span>Fire</span>
                    </button>
                    <button type="button" class="dropdown-item" data-value="evacuation">
                      <i class="fa-solid fa-person-walking"></i>
                      <span>Evacuation</span>
                    </button>
                    <button type="button" class="dropdown-item" data-value="hazard">
                      <i class="fa-solid fa-triangle-exclamation"></i>
                      <span>Dangerous Situation</span>
                    </button>
                    <button type="button" class="dropdown-item" data-value="security">
                      <i class="fa-solid fa-shield"></i>
                      <span>Security Incident</span>
                    </button>
                    <button type="button" class="dropdown-item" data-value="flood">
                      <i class="fa-solid fa-water"></i>
                      <span>Flood</span>
                    </button>
                    <button type="button" class="dropdown-item" data-value="other">
                      <i class="fa-solid fa-ellipsis"></i>
                      <span>Other</span>
                    </button>
                  </div>
                </div>
              </div>

              <div class="form-group">
                <label>Location</label>
                <input id="alertLocation" type="text" placeholder="e.g., 3rd Floor" required>
              </div>
            </div>

            <div class="form-group">
              <label>Description</label>
              <textarea id="alertDescription" placeholder="Enter detailed description" rows="3"></textarea>
            </div>

            <div class="form-group">
              <label>Severity</label>
              <div class="severity-selector">
                <input type="hidden" id="alertSeverity" value="critical">
                <button type="button" class="severity-btn severity-critical active" data-severity="critical">Critical</button>
                <button type="button" class="severity-btn severity-high" data-severity="high">High</button>
                <button type="button" class="severity-btn severity-medium" data-severity="medium">Medium</button>
                <button type="button" class="severity-btn severity-low" data-severity="low">Low</button>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Instruction & Duration</label>
                <textarea id="alertInstructions" placeholder="Enter safety instructions" rows="3"></textarea>
              </div>

              <div class="form-group">
                <label>Active Until</label>
                <div class="date-input-group">
                  <input type="datetime-local" id="alertDuration" required>
                  <i class="fa-solid fa-calendar"></i>
                </div>
              </div>
            </div>

            <div class="form-actions">
              <button type="reset" class="btn btn-secondary">Clear</button>
              <button type="submit" class="btn btn-danger">Publish Instantly</button>
            </div>
          </form>
        </div>

        <!-- Right: Active Alerts Management -->
        <div class="alerts-section">
          <h2>Active Alert Management</h2>
          <div id="activeAlerts" class="alerts-list">
            <!-- Active alerts will be loaded here -->
          </div>
          <div id="noAlerts" class="no-alerts">
            <p>No active alerts at the moment</p>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script src="javascript/auth.js"></script>
  <script src="javascript/emergency-alerts.js"></script>
  <div class="mobile-backdrop" id="mobileBackdrop"></div>
</body>
</html>
