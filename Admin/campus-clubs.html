<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Hub - Campus Clubs</title>

  <link rel="stylesheet" href="styles/campus-clubs.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>CAMPUS HUB</h2>
      </div>

      <div class="user" onclick="window.location='admin-profile.html'">
        <img src="images/admin.png" alt="user">
        <div>
          <p>Admin Name</p>
          <small>admin@example.com</small>
        </div>
      </div>

      <nav class="menu">
        <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
        <a href="facility-event-admin.html"><i class="fa-solid fa-bullhorn"></i> Facility &amp; Event</a>
        <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
        <a class="active" href="campus-clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
        <a href="updates-feed.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
        <a href="add-notification.html"><i class="fa-solid fa-bell"></i> Notification</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Top bar -->
      <header class="topbar">
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        <h1>Campus Clubs</h1>

        <div class="top-actions">
          <div class="search">
            <input id="searchInput" type="text" placeholder="Search..." />
            <button class="search-btn" type="button" aria-label="Search">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>

          <button class="add-btn" id="addClubBtn" type="button">
            <i class="fa-solid fa-plus"></i> Add Club
          </button>
        </div>
      </header>

      <!-- Cards (populated from clubs.json) -->
      <section class="grid" id="clubGrid">
        <!-- loaded dynamically -->
      </section>

    </main>
  </div>

  <script src="javascript/auth.js"></script>
  <script src="javascript/campus-clubs.js"></script>
  <div class="mobile-backdrop" id="mobileBackdrop"></div>
</body>
</html>
