<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Hub - Transit</title>

  <link rel="stylesheet" href="styles/transit.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>CAMPUS HUB</h2>
      </div>

      <div class="user" onclick="window.location='admin-profile.html'">
        <img src="images/admin.png" alt="user">
        <div>
          <p>Admin Name</p>
          <small>admin@example.com</small>
        </div>
      </div>

      <nav class="menu">
        <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
        <a href="facility-event-admin.html"><i class="fa-solid fa-bullhorn"></i> Facility & Event</a>
        <a class="active" href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
        <a href="campus-clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
        <a href="updates-feed.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
        <a href="add-notification.html"><i class="fa-solid fa-bell"></i> Notification</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Top Title -->
      <header class="page-title sticky-title">
        <button class="back-btn" onclick="history.back()" title="Back"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        Add new Update
      </header>

      <!-- Form Card -->
      <section class="panel">
        <h3 class="panel-title">Add New Update</h3>

        <form id="updateForm" class="form">

          <div class="row">
            <label>Route:</label>
            <div class="select-wrap">
              <i id="iconPreview" class="fa-solid fa-bus"></i>
              <select id="routeSelect">
                <option value="Gampaha" data-icon="fa-bus" selected>Gampaha</option>
                <option value="Negombo" data-icon="fa-umbrella-beach">Negombo</option>
                <option value="Wattala" data-icon="fa-city">Wattala</option>
                <option value="Moratuwa" data-icon="fa-monument">Moratuwa</option>
              </select>
              <i class="fa-solid fa-caret-down caret"></i>
            </div>
          </div>

          <div class="row">
            <label>Message:</label>
            <input id="msgInput" type="text" placeholder="Shuttle departed Gampaha terminal." required>
          </div>

          <div class="row">
            <label>Description: <span class="optional">(optional)</span></label>
            <input id="descInput" type="text" placeholder="The shuttle left 5 minutes due to heavy traffic.">
          </div>

          <div class="row check-row">
            <label></label>
            <label class="check">
              <input id="sendLiveLocation" type="checkbox">
              Send live location
            </label>
          </div>

          <div class="row" id="liveLinkRow">
            <label></label>
            <div class="location-field">
              <i class="fa-solid fa-location-dot"></i>
              <input id="liveLinkInput" type="text" placeholder="https://maps.campus-hub.com/gampaha-shuttle-23423">
            </div>
          </div>

          <div class="row check-row">
            <label></label>
            <label class="check">
              <input id="sendNotification" type="checkbox">
              Send as notification
            </label>
          </div>

          <div class="actions">
            <button type="submit" class="btn post">Post Update</button>
            <button type="button" class="btn cancel" id="cancelBtn">Cancel</button>
          </div>

        </form>
      </section>

      <hr style="border:none;border-top:1px solid #e0e0e0;margin:8px 0;">
      <div class="panels">
        <!-- left column (updates) -->
        <div class="column updates-col">
          <section class="recent">
            <div class="recent-head">Recent Updates</div>
            <div id="recentUpdatesContainer">
              <div id="recentList"></div>
            </div>
          </section>
        </div>

        <!-- right column (join requests) -->
        <div class="column join-col">
          <section class="join-requests">
            <div class="recent-head">Join Requests</div>
            <div id="routeTiles" class="request-tiles"></div>
          </section>
        </div>
      </div>

    </main>
  </div>

  <script src="javascript/auth.js"></script>
  <script src="javascript/transit.js"></script>

  <!-- Success Toast Notification -->
  <div id="successToast" class="toast-notification">
    <i class="fa-solid fa-check-circle"></i>
    <span id="toastMessage">Update posted successfully</span>
  </div>

  <div class="mobile-backdrop" id="mobileBackdrop"></div>
</body>
</html>
