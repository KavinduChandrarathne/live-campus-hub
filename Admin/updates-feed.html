<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Hub - Updates Feed</title>

  <link rel="stylesheet" href="styles/updates-feed.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>CAMPUS HUB</h2>
      </div>

      <div class="user" onclick="window.location='admin-profile.html'">
        <img src="images/admin.png" alt="user">
        <div>
          <p>Admin Name</p>
          <small>admin@example.com</small>
        </div>
      </div>

      <nav class="menu">
        <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
        <a href="facility-event-admin.html"><i class="fa-solid fa-bullhorn"></i> Facility &amp; Event</a>
        <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
        <a href="campus-clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
        <a class="active" href="updates-feed.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
        <a href="add-notification.html"><i class="fa-solid fa-bell"></i> Notification</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Title bar -->
      <header class="page-title">
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        Updates Feed
      </header>

      <!-- Feed -->
      <section class="updates-container">

        <div class="updates-column">
          <h2>Facility & Event Updates</h2>
          <div class="feed" id="facility-feed">
            <!-- Facility updates will be loaded here -->
          </div>
        </div>

        <div class="updates-column">
          <h2>Club Updates</h2>
          <div class="feed" id="club-feed">
            <!-- Club updates will be loaded here -->
          </div>
        </div>

      </section>

    </main>
  </div>

  <script src="javascript/auth.js"></script>
  <script src="javascript/updates-feed.js"></script>
  <div class="mobile-backdrop" id="mobileBackdrop"></div>
</body>
</html>
