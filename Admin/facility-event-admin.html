<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facility & Event Updates - Admin</title>

  <link rel="stylesheet" href="styles/facility-event-admin.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>CAMPUS HUB</h2>
      </div>

      <div class="user" onclick="window.location='admin-profile.html'">
        <img src="images/admin.png" alt="user">
        <div>
          <p>Admin Name</p>
          <small>admin@example.com</small>
        </div>
      </div>

      <nav class="menu">
        <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
        <a class="active" href="facility-event-admin.html"><i class="fa-solid fa-bullhorn"></i> Facility &amp; Event</a>
        <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
        <a href="campus-clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
        <a href="updates-feed.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
        <a href="add-notification.html"><i class="fa-solid fa-bell"></i> Notification</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Title Bar -->
      <header class="page-title sticky-title">
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        Facility &amp; Event Updates
      </header>

      <!-- Add New Update Panel -->
      <section class="panel">
        <h3 class="panel-title">Add New Update</h3>
        <form id="updateForm" class="form">
          <div class="row">
            <label>Icon:</label>
            <div class="select-wrap">
              <i id="iconPreview" class="fa-solid fa-envelope"></i>
              <select id="iconSelect" name="icon" required>
                <option value="fa-envelope" selected>Select Icon</option>
                <option value="fa-dumbbell">Gym</option>
                <option value="fa-book">Library</option>
                <option value="fa-calendar-days">Event</option>
                <option value="fa-triangle-exclamation">Warning</option>
              </select>
              <i class="fa-solid fa-caret-down caret"></i>
            </div>
          </div>
          <div class="row">
            <label>Message:</label>
            <input id="msgInput" name="message" type="text" placeholder="Enter update message..." required>
          </div>
          <div class="row">
            <label>Description: <span class="optional">(optional)</span></label>
            <input id="descInput" name="description" type="text" placeholder="Add more details...">
          </div>
          <div class="row check-row">
            <label></label>
            <label class="check">
              <input id="sendNotification" name="sendNotification" type="checkbox">
              Send as notification
            </label>
          </div>
          <div class="actions">
            <button type="submit" class="btn post">Post Update</button>
            <button type="button" class="btn cancel" id="cancelBtn">Cancel</button>
          </div>
        </form>
      </section>

      <!-- Recent Updates -->
      <section class="recent">
        <div class="recent-head">Recent Updates</div>
        <hr style="border:none;border-top:1px solid #e0e0e0;margin-bottom:16px;">
        <div id="recentUpdatesContainer"></div>
      </section>

    </main>

    <!-- Success Toast Notification -->
    <div id="successToast" class="toast-notification">
      <i class="fa-solid fa-check-circle"></i>
      <span id="toastMessage">Update posted successfully</span>
    </div>

    <!-- Edit Update Modal -->
    <div id="editUpdateModal" class="modal" style="display:none;">
      <div class="modal-content">
        <span class="close" id="closeEditModal">&times;</span>
        <h3>Edit Update</h3>
        <form id="editUpdateForm">
          <div class="row">
            <label>Icon:</label>
            <div class="select-wrap">
              <i id="editIconPreview" class="fa-solid fa-envelope"></i>
              <select id="editIconSelect" name="icon" required>
                <option value="fa-envelope">Envelope</option>
                <option value="fa-dumbbell">Gym</option>
                <option value="fa-book">Library</option>
                <option value="fa-calendar-days">Event</option>
                <option value="fa-triangle-exclamation">Warning</option>
              </select>
              <i class="fa-solid fa-caret-down caret"></i>
            </div>
          </div>
          <div class="row">
            <label>Message:</label>
            <input id="editMsgInput" name="message" type="text" required>
          </div>
          <div class="row">
            <label>Description:</label>
            <input id="editDescInput" name="description" type="text">
          </div>
          <div class="actions">
            <button type="submit" class="btn post">Save Changes</button>
            <button type="button" class="btn cancel" id="cancelEditBtn">Cancel</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script src="javascript/auth.js"></script>
  <script src="javascript/facility-event-admin.js"></script>
  <div class="mobile-backdrop" id="mobileBackdrop"></div>
</body>
</html>
