<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Hub - Admin Profile</title>

  <link rel="stylesheet" href="styles/admin-profile.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="bg-overlay"></div>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <i class="fa-solid fa-graduation-cap"></i>
        <h2>CAMPUS HUB</h2>
      </div>

      <div class="user active" onclick="window.location='admin-profile.html'">
        <img src="images/admin.png" alt="user">
        <div>
          <p>Admin Name</p>
          <small>admin@example.com</small>
        </div>
      </div>

      <nav class="menu">
        <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
        <a href="facility-event-admin.html"><i class="fa-solid fa-bullhorn"></i> Facility &amp; Event</a>
        <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
        <a href="campus-clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
        <a href="updates-feed.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
        <a href="add-notification.html"><i class="fa-solid fa-bell"></i> Notifications</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">

      <!-- Title bar -->
      <header class="page-title">
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        Profile Information
        <button id="headerLogoutBtn" class="header-logout-btn">Logout</button>
      </header>

      <!-- Profile card -->
      <section class="profile-card">

        <!-- Left photo -->
        <div class="profile-left">
          <img src="images/admin.png" alt="Profile Photo" />
        </div>

        <!-- Right form -->
        <div class="profile-right">

          <div class="row">
            <label>First Name:</label>
            <div class="input-edit">
              <input id="firstName" type="text" value="" />
              <i class="fa-solid fa-pen edit-icon"></i>
            </div>
          </div>

          <div class="row">
            <label>Last Name:</label>
            <div class="input-edit">
              <input id="lastName" type="text" value="" />
              <i class="fa-solid fa-pen edit-icon"></i>
            </div>
          </div>

          <div class="row">
            <label>Student ID:</label>
            <div class="input-edit">
              <input id="studentId" type="text" value="" />
              <i class="fa-solid fa-pen edit-icon"></i>
            </div>
          </div>

          <div class="row">
            <label>Role:</label>
            <div class="input-edit">
              <input id="role" type="text" value="Admin" readonly />
            </div>
          </div>

          <div class="row">
            <label>Date of birth:</label>
            <div class="input-edit">
              <input id="dob" type="text" value="" />
              <i class="fa-solid fa-pen edit-icon"></i>
            </div>
          </div>

          <button class="btn password" id="passwordBtn">
            Change Password
          </button>

          <div class="actions">
            <button class="btn save" id="saveBtn">Save Changes</button>
            <button class="btn cancel" id="cancelBtn">Cancel</button>
          </div>

        </div>

      </section>

    </main>
  </div>

  <!-- Password Change Modal -->
  <div id="password-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <h2>Change Password</h2>
      <form id="password-form">
        <div class="form-group">
          <label for="current-password">Current Password:</label>
          <input type="password" id="current-password" required>
        </div>
        <div class="form-group">
          <label for="new-password">New Password:</label>
          <input type="password" id="new-password" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm New Password:</label>
          <input type="password" id="confirm-password" required>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn cancel">Cancel</button>
          <button type="submit" class="btn change">Change Password</button>
        </div>
      </form>
    </div>
  </div>

  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      animation: fadeIn 0.3s;
    }
    .modal-content {
      background-color: #fff;
      margin: 10% auto;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      position: relative;
    }
    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      color: #aaa;
    }
    .close-btn:hover {
      color: #000;
    }
    .modal h2 {
      margin-top: 0;
      color: #223a5f;
      font-size: 24px;
      font-weight: 600;
    }
    .modal .form-group {
      margin-bottom: 15px;
    }
    .modal label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #223a5f;
    }
    .modal input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .modal .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal .btn.cancel {
      background: #f5f7fa;
      color: #223a5f;
    }
    .modal .btn.cancel:hover {
      background: #e6eaf2;
    }
    .modal .btn.change {
      background: #223a5f;
      color: #fff;
    }
    .modal .btn.change:hover {
      background: #2d4a7a;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <script src="javascript/auth.js"></script>
  <script src="javascript/admin-profile.js"></script>
  <div class="mobile-backdrop" id="mobileBackdrop"></div>
</body>
</html>
