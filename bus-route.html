<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Campus Hub - Bus Routes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="./">
  <link rel="stylesheet" href="./styles/dashboard.css" />
  <link rel="stylesheet" href="./styles/transit.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="./styles/emergency-alert-banner.css" />
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>CAMPUS HUB</span>
        </div>

        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="facility.html"><i class="fa-solid fa-bullhorn"></i> Facility & Event</a>
            <a class="active" href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
            <a href="clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
            <a href="updates.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
            <a href="rewards.html"><i class="fa-solid fa-star"></i> Rewards</a>
        </nav>

        <div class="sidebar-user-bottom">
          <a class="user-profile-btn" href="profile.html" title="View Profile">
            <img id="sidebar-picture" src="" alt="User">
            <div class="user-info-text">
              <strong id="sidebar-name"></strong>
              <small id="sidebar-email"></small>
            </div>
          </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="content">
        <button id="hamburger" class="hamburger" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <header class="page-title">
            <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:space-between;">
              <div style="display:flex;align-items:center;gap:12px;">
                <h2 id="route-title">Shuttle</h2>
                <span id="status-badge" class="badge on-time">On time</span>
              </div>
              <button id="postUpdateBtn" class="btn-route" style="margin-top:0;margin-bottom:0;">
                <i class="fa-solid fa-plus" style="margin-right:8px;font-weight:700;"></i>Post an Update
              </button>
            </div>
        </header>

        <section class="updates-section">
            <h3 style="margin-bottom:16px; color:#11223b; font-size:18px; font-weight:600;">Shuttle Updates</h3>
            <div class="updates-list"></div>
        </section>
    </main>

</div>

<script>
  function getQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  let loc = getQueryParam('loc') || 'Gampaha';
  document.getElementById('route-title').textContent = `${loc} Shuttle`;

  const updatesListEl = document.querySelector('.updates-list');

  function renderUpdates(updates) {
    updatesListEl.innerHTML = '';
    if (updates.length === 0) {
      updatesListEl.innerHTML = '<div class="update"><div>No updates available.</div></div>';
      return;
    }

    updates.forEach(u => {
      const div = document.createElement('div');
      div.className = 'update';
      const iconClass = u.icon || 'fa-bus';
      div.innerHTML = `
        <i class="fa-solid ${iconClass}"></i>
        <div style="display:flex;flex-direction:column;">
          <strong>${u.message}</strong>
          <p>${u.description || ''}</p>
          ${u.liveLink ? `<p><a href="${u.liveLink}" target="_blank">Live location</a></p>` : ''}
          <div style="display:flex;margin-top:4px;">
            <small class="muted">${u.datetime}</small>
            <div style="flex:1"></div>
            <small class="muted" style="font-weight:600;color:#23395d;text-align:right;min-width:120px;">${u.userName || ''}</small>
          </div>
        </div>
      `;
      updatesListEl.appendChild(div);
    });
  }

  // load updates from API and filter out live-location entries
  function refreshUpdates() {
    fetch(`/api/transit-updates?route=${encodeURIComponent(loc)}`)
      .then(r => r.json())
      .then(result => {
          const all = result.success ? result.data : [];
        const filtered = all.filter(u => {
          const r = (u.route || '').trim().toLowerCase();
          const desired = loc.trim().toLowerCase();
          // only regular updates (no liveLink) should appear on the bus-route page
          return r === desired && !u.liveLink;
        });
        renderUpdates(filtered);
      })
      .catch(err => console.error('Failed to load transit updates', err));
  }
  refreshUpdates();

  // listen for server push notifications
  try {
    const uname = encodeURIComponent((getCurrentUser() || {}).username || '');
    const es = new EventSource(`Admin/shared/php/user-updates-sse.php?username=${uname}`);
    es.addEventListener('transitupdate', () => {
      refreshUpdates();
    });
    window.addEventListener('beforeunload', () => es.close());
  } catch (e) {
    console.warn('Transit SSE not available', e);
  }

  const postBtn = document.getElementById('postUpdateBtn');
  if (postBtn) {
    postBtn.addEventListener('click', () => {
      // Show modal for posting update
      let modal = document.getElementById('transitUpdateModal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'transitUpdateModal';
        modal.className = 'modal';
        modal.style = 'display:flex;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.35);z-index:1000;align-items:center;justify-content:center;';
        modal.innerHTML = `<div class="modal-content" style="background:#fff;padding:32px 24px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.18);max-width:400px;width:90%;position:relative;">
          <button id="closeTransitUpdateModal" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;color:#888;cursor:pointer;">&times;</button>
          <h3 style="margin-top:0;margin-bottom:16px;font-size:22px;font-weight:700;color:#23395d;">Add Transit Update</h3>
          <label for="transitUpdateMessage" style="font-size:14px;color:#333;margin-bottom:8px;display:block;">Update Message:</label>
          <textarea id="transitUpdateMessage" rows="4" style="width:100%;border-radius:8px;border:1px solid #ccc;padding:10px;font-size:14px;margin-bottom:18px;resize:none;"></textarea>
          <button id="submitTransitUpdate" style="background:#23395d;color:#fff;font-weight:700;padding:10px 18px;border:none;border-radius:8px;font-size:15px;cursor:pointer;">Submit Update</button>
        </div>`;
        document.body.appendChild(modal);
      }
      modal.style.display = 'flex';
      document.getElementById('transitUpdateMessage').value = '';
      // Close modal logic
      document.getElementById('closeTransitUpdateModal').onclick = () => { modal.style.display = 'none'; };
      modal.onclick = e => { if (e.target === modal) modal.style.display = 'none'; };
      // Submit update logic
      document.getElementById('submitTransitUpdate').onclick = async () => {
        const message = document.getElementById('transitUpdateMessage').value.trim();
        if (!message) { alert('Please enter an update message.'); return; }
        const user = await getCurrentUserAsync();
        const userName = `${user.firstName || ''} ${user.lastName || ''}`.trim() || user.username || user.email || 'Unknown';
        const form = new FormData();
        form.append('route', loc);
        form.append('message', message);
        form.append('userName', userName);
        fetch('Admin/shared/php/add-transit-update.php', {
          method: 'POST',
          body: form
        })
        .then(r => r.json())
        .then(resp => {
          if (resp.success) {
            modal.style.display = 'none';
            refreshUpdates();
          } else {
            alert('Error: ' + (resp.error || 'unknown'));
          }
        })
        .catch(() => {
          alert('Failed to post update.');
        });
      };
    });
  }
</script>

<!-- Hamburger menu handler -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const hamburger = document.getElementById('hamburger');
  const sidebar = document.querySelector('.sidebar');
  if (hamburger && sidebar) {
    hamburger.addEventListener('click', function () {
      sidebar.classList.toggle('active');
    });

    // Close sidebar when clicking on a link
    const navLinks = sidebar.querySelectorAll('nav a');
    navLinks.forEach(link => {
      link.addEventListener('click', function () {
        sidebar.classList.remove('active');
      });
    });

    // Close sidebar when clicking outside
    document.addEventListener('click', function (event) {
      if (!sidebar.contains(event.target) && !hamburger.contains(event.target)) {
        sidebar.classList.remove('active');
      }
    });
  }
});
</script>

<script src="./javascript/common.js"></script>
<script src="./javascript/emergency-alert-banner.js"></script>
</body>
</html>
