<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Campus Hub - Transit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />    <base href="./">
  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <link rel="stylesheet" href="./styles/dashboard.css" />
  <link rel="stylesheet" href="./styles/transit.css" />
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>CAMPUS HUB</span>
        </div>

        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="facility.html"><i class="fa-solid fa-bullhorn"></i> Facility & Event</a>
            <a class="active" href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
            <a href="clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
            <a href="updates.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
            <a href="rewards.html"><i class="fa-solid fa-star"></i> Rewards</a>
        </nav>

        <div class="sidebar-user-bottom">
            <a class="user-profile-btn" href="profile.html" title="View Profile">
                <img id="sidebar-picture" src="./images/naveen.png" alt="User">
                <div class="user-info-text">
                    <strong id="sidebar-name">User Name</strong>
                    <small id="sidebar-email">user@email.com</small>
                </div>
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="content">
        <!-- Mobile hamburger menu -->
        <button id="hamburger" class="hamburger" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <header class="page-title">
            Transit and Navigation
        </header>

        <section class="transit-cards">

            <!-- Card 1 -->
            <article class="transit-card" data-location="Gampaha">
                <div class="lock-overlay"><i class="fa-solid fa-lock"></i></div>
                <div class="card-top">
                    <div class="place">
                        <i class="fa-solid fa-location-dot"></i>
                        <h3>Gampaha</h3>
                    </div>
                    <button class="btn-route">View location updates</button>
                </div>

                <div class="map">
                    <img src="./images/gampaha.png" alt="Gampaha Map">
                </div>

                <button class="btn-update">View live location</button>
            </article>

            <!-- Card 2 -->
            <article class="transit-card" data-location="Negombo">
                <div class="lock-overlay"><i class="fa-solid fa-lock"></i></div>
                <div class="card-top">
                    <div class="place">
                        <i class="fa-solid fa-location-dot"></i>
                        <h3>Negombo</h3>
                    </div>
                    <button class="btn-route">View location updates</button>
                </div>

                <div class="map">
                    <img src="./images/Negombo.png" alt="Negombo Map">
                </div>

                <button class="btn-update">View live location</button>
            </article>

            <!-- Card 3 -->
            <article class="transit-card" data-location="Moratuwa">
                <div class="lock-overlay"><i class="fa-solid fa-lock"></i></div>
                <div class="card-top">
                    <div class="place">
                        <i class="fa-solid fa-location-dot"></i>
                        <h3>Moratuwa</h3>
                    </div>
                    <button class="btn-route">View location updates</button>
                </div>

                <div class="map">
                    <img src="./images/Moratuwa.png" alt="Moratuwa Map">
                </div>

                <button class="btn-update">View live location</button>
            </article>

            <!-- Card 4 -->
            <article class="transit-card" data-location="Wattala">
                <div class="lock-overlay"><i class="fa-solid fa-lock"></i></div>
                <div class="card-top">
                    <div class="place">
                        <i class="fa-solid fa-location-dot"></i>
                        <h3>Wattala</h3>
                    </div>
                    <button class="btn-route">View location updates</button>
                </div>

                <div class="map">
                    <img src="./images/Wattala.png" alt="Wattala Map">
                </div>

                <button class="btn-update">View live location</button>
            </article>

        </section>
    </main>
</main>

<!-- Transit Update Modal -->
<div id="transitUpdateModal" class="modal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.35);z-index:1000;align-items:center;justify-content:center;">
    <div class="modal-content" style="background:#fff;padding:32px 24px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.18);max-width:400px;width:90%;position:relative;">
        <button id="closeTransitUpdateModal" style="position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;color:#888;cursor:pointer;">&times;</button>
        <h3 style="margin-top:0;margin-bottom:16px;font-size:22px;font-weight:700;color:#23395d;">Add Transit Update</h3>
        <label for="transitUpdateMessage" style="font-size:14px;color:#333;margin-bottom:8px;display:block;">Update Message:</label>
        <textarea id="transitUpdateMessage" rows="4" style="width:100%;border-radius:8px;border:1px solid #ccc;padding:10px;font-size:14px;margin-bottom:18px;resize:none;"></textarea>
        <button id="submitTransitUpdate" style="background:#23395d;color:#fff;font-weight:700;padding:10px 18px;border:none;border-radius:8px;font-size:15px;cursor:pointer;">Submit Update</button>
    </div>
</div>

</div>

<!-- Scroll to top (mobile) -->
<button id="scrollTop" class="scroll-top" aria-label="Scroll to top">
    <i class="fa-solid fa-arrow-up"></i>
</button>

<!-- Toast Notification -->
<div id="toast" style="display:none;position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#28a745;color:#fff;padding:14px 24px;border-radius:10px;font-size:15px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.25);opacity:0;transition:opacity .3s,bottom .3s;z-index:2000;"></div>

<script src="javascript/common.js"></script>
<script src="javascript/dashboard.js"></script>
<script src="javascript/transit.js"></script>
</body>
<script>
// User dropdown logic for logout/profile
document.addEventListener('DOMContentLoaded', function () {
    const userDropdown = document.getElementById('userDropdown');
    const userMainBtn = document.getElementById('userMainBtn');
    const userDropdownMenu = document.getElementById('userDropdownMenu');
    if (userDropdown && userMainBtn && userDropdownMenu) {
        userMainBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            userDropdown.classList.toggle('open');
        });
        document.addEventListener('click', function (e) {
            if (!userDropdown.contains(e.target)) {
                userDropdown.classList.remove('open');
            }
        });
    }
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', function () {
            sessionStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
    }
});
</script>
</html>
