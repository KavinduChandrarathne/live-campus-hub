<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Hub | Calendar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="./">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./styles/dashboard.css">
    <link rel="stylesheet" href="./styles/calendar.css">
    <link rel="stylesheet" href="./styles/emergency-alert-banner.css">
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>CAMPUS HUB</span>
        </div>

        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="facility.html"><i class="fa-solid fa-bullhorn"></i> Facility & Event</a>
            <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
            <a href="clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
            <a href="updates.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
            <a href="rewards.html"><i class="fa-solid fa-star"></i> Rewards</a>
        </nav>

        <div class="sidebar-user-bottom">
            <a class="user-profile-btn" href="profile.html" title="View Profile">
                <img id="sidebar-picture" src="" alt="User">
                <div class="user-info-text">
                    <strong id="sidebar-name"></strong>
                    <small id="sidebar-email"></small>
                </div>
            </a>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="content">
        <!-- Mobile hamburger menu -->
        <button id="hamburger" class="hamburger" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <section class="welcome">
            <h2>Calendar</h2>
            <p>Manage your academic, personal, and club events</p>
        </section>

        <!-- Calendar Controls -->
        <section class="calendar-controls">
            <div class="view-selector">
                <button class="view-btn active" data-view="month">
                    <i class="fa-solid fa-calendar-days"></i> Month
                </button>
                <button class="view-btn" data-view="week">
                    <i class="fa-solid fa-calendar-week"></i> Week
                </button>
                <button class="view-btn" data-view="day">
                    <i class="fa-solid fa-calendar"></i> Day
                </button>
            </div>

            <div class="calendar-nav">
                <button id="prevBtn" class="nav-btn">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h3 id="currentMonth" class="current-date">June 2026</h3>
                <button id="nextBtn" class="nav-btn">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
                <button id="todayBtn" class="today-btn">Today</button>
            </div>

            <div class="calendar-actions">
                <button id="createEventBtn" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> Create Event
                </button>
            </div>
        </section>

        <!-- Category Filter -->
        <section class="calendar-filters">
            <div class="filter-group">
                <label>Filter by Category:</label>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="personal">
                        <i class="fa-solid fa-user"></i> Personal
                    </button>
                    <button class="filter-btn" data-category="meeting">
                        <i class="fa-solid fa-users"></i> Meeting
                    </button>
                    <button class="filter-btn" data-category="event">
                        <i class="fa-solid fa-star"></i> Event
                    </button>
                    <button class="filter-btn" data-category="admin">
                        <i class="fa-solid fa-clipboard"></i> Admin
                    </button>
                    <button class="filter-btn" data-category="club">
                        <i class="fa-solid fa-users-line"></i> Club
                    </button>
                </div>
            </div>
        </section>

        <!-- Calendar Display with Events Sidebar -->
        <section class="calendar-with-sidebar">
            <!-- Calendar Main Content -->
            <div class="calendar-main">
                <!-- Month View -->
                <div id="monthView" class="calendar-view active">
                    <div class="weekdays-header">
                        <div class="weekday">Mon</div>
                        <div class="weekday">Tue</div>
                        <div class="weekday">Wed</div>
                        <div class="weekday">Thu</div>
                        <div class="weekday">Fri</div>
                        <div class="weekday">Sat</div>
                        <div class="weekday">Sun</div>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                        <!-- Days will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Week View (7 Days - Mon to Sun) -->
                <div id="weekView" class="calendar-view">
                    <div class="week-container" id="weekGrid">
                        <!-- Grid table with time labels, day headers, and events will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Day View (iPhone Style) -->
                <div id="dayView" class="calendar-view">
                    <div class="day-container">
                        <div class="day-header-detail" id="dayHeaderDetail">
                            <div class="day-header-text">
                                <p id="dayHeaderDay">Wednesday, June 10, 2026</p>
                                <p id="dayHeaderDate" class="day-header-large">10</p>
                            </div>
                        </div>
                        <div class="day-content">
                            <div class="time-column">
                                <div class="time-header">Time</div>
                                <div class="time-slots" id="dayTimeSlots">
                                    <!-- Time slots will be populated by JavaScript -->
                                </div>
                            </div>
                            <div class="day-events-grid" id="dayEventsGrid">
                                <!-- Day events will be populated by JavaScript -->
                            </div>
                        </div>
                        <button class="day-add-btn" onclick="openEventModal(currentDate)">
                            <i class="fa-solid fa-plus"></i> Add Personal Event
                        </button>
                    </div>
                </div>
            </div>

            <!-- Events Sidebar -->
            <aside class="events-sidebar">
                <div class="events-sidebar-header">
                    <h3 id="sidebarTitle">Events</h3>
                </div>
                <div id="eventsSidebarContent" class="events-list">
                    <!-- Events will be populated by JavaScript -->
                </div>
            </aside>
        </section>
    </main>

</div>

<!-- Create/Edit Event Modal -->
<div id="eventModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Create New Event</h2>
            <button class="modal-close" id="closeModalBtn">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <form id="eventForm" class="event-form">
            <div class="form-group">
                <label for="eventTitle">Event Title *</label>
                <input type="text" id="eventTitle" name="title" required placeholder="Enter event title">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="eventDate">Date *</label>
                    <input type="date" id="eventDate" name="date" required>
                </div>
                <div class="form-group">
                    <label for="eventCategory">Category *</label>
                    <select id="eventCategory" name="category" required>
                        <option value="">Select Category</option>
                        <option value="personal">Personal</option>
                        <option value="meeting">Meeting</option>
                        <option value="event">Event</option>
                        <option value="other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="eventStartTime">Start Time *</label>
                    <input type="time" id="eventStartTime" name="startTime" required>
                </div>
                <div class="form-group">
                    <label for="eventEndTime">End Time *</label>
                    <input type="time" id="eventEndTime" name="endTime" required>
                </div>
            </div>

            <div class="form-group">
                <label for="eventLocation">Location</label>
                <input type="text" id="eventLocation" name="location" placeholder="Enter location">
            </div>

            <div class="form-group">
                <label for="eventDescription">Description</label>
                <textarea id="eventDescription" name="description" placeholder="Enter event description" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label for="eventReminder">Reminder Before *</label>
                <select id="eventReminder" name="reminder" required>
                    <option value="">Select reminder time</option>
                    <option value="10">10 minutes</option>
                    <option value="30">30 minutes</option>
                    <option value="60">1 hour</option>
                    <option value="1440">1 day</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Event</button>
                <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- Event Details View Modal -->
<div id="eventDetailsModal" class="modal">
    <div class="modal-content event-details-modal">
        <div class="modal-header">
            <h2 id="detailsTitle">Event Details</h2>
            <button class="modal-close" id="closeDetailsBtn">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div id="eventDetailsContent" class="event-details-content">
            <!-- Event details will be populated by JavaScript -->
        </div>

        <div class="modal-actions">
            <button id="editEventBtn" class="btn btn-primary">
                <i class="fa-solid fa-edit"></i> Edit
            </button>
            <button id="deleteEventBtn" class="btn btn-danger">
                <i class="fa-solid fa-trash"></i> Delete
            </button>
            <button id="closeDetailsModalBtn" class="btn btn-secondary">Close</button>
        </div>
    </div>
</div>

<button id="scrollTop" class="scroll-top" aria-label="Scroll to top">
    <i class="fa-solid fa-arrow-up"></i>
</button>

<script src="javascript/common.js"></script>
<script src="javascript/calendar.js"></script>
<script src="javascript/emergency-alert-banner.js"></script>

</body>
</html>
