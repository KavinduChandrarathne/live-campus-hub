<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Hub - Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="./">

    <!-- shared sidebar/layout styles -->
    <link rel="stylesheet" href="./styles/dashboard.css">
    <!-- page-specific styles -->
    <link rel="stylesheet" href="./styles/profile.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>CAMPUS HUB</span>
        </div>

        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
            <a href="facility.html"><i class="fa-solid fa-bullhorn"></i> Facility & Event</a>
            <a href="transit.html"><i class="fa-solid fa-bus"></i> Transit</a>
            <a href="clubs.html"><i class="fa-solid fa-users"></i> Campus Clubs</a>
            <a href="updates.html"><i class="fa-solid fa-message"></i> Updates Feed</a>
            <a href="rewards.html"><i class="fa-solid fa-star"></i> Rewards</a>
        </nav>

        <div class="sidebar-user-bottom">
            <a class="user-profile-btn" href="profile.html" title="View Profile">
                <img id="sidebar-picture" src="./images/naveen.png" alt="User">
                <div class="user-info-text">
                    <strong id="sidebar-name">User Name</strong>
                    <small id="sidebar-email">user@email.com</small>
                </div>
            </a>
        </div>
    <style>
    .user-dropdown {
        margin-top: auto;
        margin-bottom: 0;
        padding-top: 20px;
    }
    .user-dropdown img#sidebar-picture {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #fff;
        box-shadow: 0 2px 8px rgba(0,0,0,0.10);
        background: #e6e6e6;
    }
    .user-main {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        width: 100%;
    }
    .user-info-text {
        min-width: 0;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }
    .user-info-text strong {
        font-size: 14px;
        font-weight: 600;
        color: white;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .user-info-text small {
        color: #b8c4d6;
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-top: 2px;
    }
    .dropdown-caret {
        margin-left: 8px;
        color: #b8c4d6;
        font-size: 14px;
        transition: transform 0.2s;
    }
    .user-dropdown.open .dropdown-caret {
        transform: rotate(180deg);
    }
    .dropdown-menu {
        display: none;
        position: absolute;
        left: 0;
        bottom: 48px;
        background: #223a5f;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.13);
        min-width: 160px;
        z-index: 1001;
        flex-direction: column;
        padding: 8px 0;
        animation: fadeIn 0.2s;
    }
    .user-dropdown.open .dropdown-menu {
        display: flex;
    }
    .dropdown-menu a, .dropdown-menu button {
        color: #cfd8e3;
        background: none;
        border: none;
        width: 100%;
        text-align: left;
        padding: 10px 18px;
        font-size: 15px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: background 0.18s, color 0.18s;
    }
    .dropdown-menu a:hover, .dropdown-menu button:hover {
        background: #2d4a7a;
        color: #fff;
    }
    .logout-btn {
        color: #ff4757;
        font-weight: 600;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    </style>

        <!-- Toast Notification -->
        <div id="toast" class="toast"></div>
        <style>
            .toast {
                visibility: hidden;
                min-width: 220px;
                max-width: 90vw;
                background-color: #223a5f;
                color: #fff;
                text-align: center;
                border-radius: 8px;
                padding: 16px 28px;
                position: fixed;
                z-index: 2000;
                left: 50%;
                top: 40px;
                transform: translateX(-50%);
                font-size: 17px;
                font-weight: 500;
                box-shadow: 0 4px 16px rgba(0,0,0,0.13);
                opacity: 0;
                transition: opacity 0.3s, visibility 0.3s;
            }
            .toast.show {
                visibility: visible;
                opacity: 1;
            }
            .toast.toast-error {
                background: #ff4757;
            }
            .toast.toast-success {
                background: #2ecc71;
            }
        </style>
    </aside>

    <!-- MAIN -->
    <main class="content">
        <button id="hamburger" class="hamburger" aria-label="Menu">
            <i class="fa-solid fa-bars"></i>
        </button>

        <header class="page-title">Profile Information</header>

        <section style="padding: 24px 0;">
            <div class="profile-card">

                <div class="profile-left">
                    <img id="profile-picture" src="./images/default.png" alt="Profile" style="border-radius: 50%; width: 120px; height: 120px; box-shadow: 0 2px 8px rgba(0,0,0,0.10); margin-bottom: 16px;">
                    <form id="profile-photo-form" enctype="multipart/form-data" style="display: flex; flex-direction: column; align-items: flex-start; gap: 8px; margin-top: 12px;">
                        <label for="profile-photo-input" class="custom-file-label">
                            <i class="fa-solid fa-image"></i> Choose File
                        </label>
                        <input type="file" id="profile-photo-input" accept="image/*" style="display:none;">
                        <button type="submit" id="update-photo-btn" class="custom-update-btn">
                            <i class="fa-solid fa-upload"></i> Update Profile Photo
                        </button>
                        <style>
                            .custom-file-label {
                                background: #f5f7fa;
                                color: #223a5f;
                                border-radius: 8px;
                                padding: 8px 18px;
                                font-size: 15px;
                                font-weight: 500;
                                cursor: pointer;
                                box-shadow: 0 2px 8px rgba(0,0,0,0.10);
                                display: flex;
                                align-items: center;
                                gap: 10px;
                                transition: background 0.18s, color 0.18s;
                                margin-bottom: 6px;
                            }
                            .custom-file-label:hover {
                                background: #e6eaf2;
                                color: #1a2a3a;
                            }
                            .custom-update-btn {
                                background: #223a5f;
                                color: #fff;
                                border: none;
                                border-radius: 8px;
                                padding: 10px 24px;
                                font-size: 16px;
                                font-weight: 600;
                                cursor: pointer;
                                box-shadow: 0 2px 8px rgba(0,0,0,0.10);
                                display: flex;
                                align-items: center;
                                gap: 10px;
                                transition: background 0.18s, box-shadow 0.18s, transform 0.12s;
                            }
                            .custom-update-btn:hover {
                                background: #2d4a7a;
                            }
                        </style>
                    </form>
                </div>
                <div class="profile-right">
                    <div class="form-group">
                        <label>First Name:</label>
                        <div class="input-edit">
                            <input id="profile-firstname" type="text" value="">
                            <i class="fa-solid fa-pen"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Last Name:</label>
                        <div class="input-edit">
                            <input id="profile-lastname" type="text" value="">
                            <i class="fa-solid fa-pen"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Student ID:</label>
                        <div class="input-edit">
                            <input id="profile-studentid" type="text" value="">
                            <i class="fa-solid fa-pen"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email:</label>
                        <div class="input-edit">
                            <input id="profile-email" type="email" value="">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Faculty:</label>
                        <div class="input-edit">
                            <select id="profile-faculty" style="width: 100%; padding: 12px; border-radius: 5px; border: 1px solid #c0c4c8; box-sizing: border-box; margin: 0; transition: border-color 0.18s ease, box-shadow 0.18s ease; font-size: 14px;">
                                <option value="">Select Faculty</option>
                                <option value="Business">Business</option>
                                <option value="Arts">Arts</option>
                                <option value="Science">Science</option>
                                <option value="Engineering">Engineering</option>
                                <option value="Medicine">Medicine</option>
                                <option value="Law">Law</option>
                                <option value="IT">IT</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Date of birth:</label>
                        <div class="input-edit">
                            <input id="profile-dob" type="text" value="">
                            <i class="fa-solid fa-pen"></i>
                        </div>
                    </div>

                    <button class="password-btn">Change Password <i class="fa-solid fa-lock"></i></button>

                    <div class="button-row">
                        <button class="save-btn">Save Changes</button>
                        <button class="cancel-btn">Cancel</button>
                    </div>
                    <div class="logout-row" style="display: flex; justify-content: flex-start; margin-top: 18px; margin-left: 160px; width: calc(100% - 160px);">
                        <button id="logoutBtn" class="logout-btn-centered" style="background: #ff5e5e; color: #fff; border: none; border-radius: 8px; padding: 12px 36px; font-size: 18px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.10); transition: background 0.18s, box-shadow 0.18s, transform 0.12s; margin-left: 100px;" title="Log out">
                            <i class="fa-solid fa-right-from-bracket"></i> Log out
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Password Change Modal -->
    <div id="password-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Change Password</h2>
            <form id="password-form">
                <div class="form-group">
                    <label for="current-password">Current Password:</label>
                    <input type="password" id="current-password" required>
                </div>
                <div class="form-group">
                    <label for="new-password">New Password:</label>
                    <input type="password" id="new-password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm New Password:</label>
                    <input type="password" id="confirm-password" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn cancel">Cancel</button>
                    <button type="submit" class="btn change">Change Password</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }
        .modal-content {
            background-color: #fff;
            margin: 6% auto;
            padding: 32px 32px 24px 32px;
            border-radius: 16px;
            width: 95%;
            max-width: 520px;
            min-width: 340px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }
        .close-btn:hover {
            color: #000;
        }
        .modal h2 {
            margin-top: 0;
            color: #223a5f;
            font-size: 24px;
            font-weight: 600;
        }
        .modal .form-group {
            margin-bottom: 15px;
        }
        .modal label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #223a5f;
        }
        .modal input {
            width: 100%;
            padding: 14px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            box-sizing: border-box;
            margin-top: 2px;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .modal .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal .btn.cancel {
            background: #f5f7fa;
            color: #223a5f;
        }
        .modal .btn.cancel:hover {
            background: #e6eaf2;
        }
        .modal .btn.change {
            background: #223a5f;
            color: #fff;
        }
        .modal .btn.change:hover {
            background: #2d4a7a;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>

</div>

<script src="javascript/common.js"></script>
<script src="javascript/profile.js"></script>
</body>
</html>
